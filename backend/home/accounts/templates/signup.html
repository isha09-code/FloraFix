{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - KisanChikitsa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <div class="fixed inset-0 -z-10 bg-[#000000] bg-[radial-gradient(#ffffff33_1px,#00091d_1px)] bg-[size:20px_20px]"></div>
  <style>
    .success { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
  </style>
</head>
<body class="bg-[#0d1b2a] text-white min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md bg-[#1e2a3a] p-8 rounded-2xl shadow-2xl">
    <h2 class="text-3xl font-semibold text-center mb-6">Sign Up</h2>

    <!-- ✅ Messages -->
    {% if messages %}
      {% for msg in messages %}
        <p class="{% if msg.tags == 'error' %}error{% else %}success{% endif %} mb-2">{{ msg }}</p>
      {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'accounts:signup' %}" class="space-y-4">
      {% csrf_token %}

      <div>
        <label class="block mb-1 text-sm">Full Name</label>
        <input type="text" name="full_name" placeholder="John Doe" class="w-full p-3 bg-[#2e3b4e] rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
      </div>

      <div>
        <label class="block mb-1 text-sm">Email</label>
        <input type="email" name="email" placeholder="you@example.com" class="w-full p-3 bg-[#2e3b4e] rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
      </div>

      <div>
        <label class="block mb-1 text-sm">Password</label>
        <input type="password" name="password" placeholder="Your password" class="w-full p-3 bg-[#2e3b4e] rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
      </div>

      <div>
        <label class="block mb-1 text-sm">Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm password" class="w-full p-3 bg-[#2e3b4e] rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400" required>
      </div>

      <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-medium py-3 rounded-lg transition duration-300">
        Sign Up
      </button>

      <p class="text-sm text-center mt-4 text-gray-300">
        Already have an account?
        <a href="{% url 'accounts:signin' %}" class="text-green-400 hover:underline">Sign In</a>
      </p>
    </form>
  </div>
</body>
</html>
